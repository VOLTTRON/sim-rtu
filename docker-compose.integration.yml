services:
  sim-rtu:
    build: .
    ports:
      - "47808:47808/udp"
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
    command: ["--config", "configs/default.yml", "--log-level", "DEBUG"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/status"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
    networks:
      - bacnet

networks:
  bacnet:
    driver: bridge
